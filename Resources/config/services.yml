parameters:
    kami_api_core.routing_loader.class:         Kami\ApiCoreBundle\Routing\ApiLoader
    kami_api_core.api_manager.class:            Kami\ApiCoreBundle\Manager\ApiManager
    kami_api_core.access_manager.class:         Kami\ApiCoreBundle\Security\AccessManager
    kami_api_core.form_factory.class:           Kami\ApiCoreBundle\Form\Factory
    kami_api_core.request_body_converter.class: Kami\ApiCoreBundle\Listener\RequestBodyConverter

services:
    kami_api_core.routing_loader:
        class: "%kami_api_core.routing_loader.class%"
        arguments:
          - "%kami_api_core.Resources%"
          - "%kami_api_core.locales%"
          - "%kernel.default_locale%"
        tags: [ routing.loader ]

    kami_api_core.request_body_converter:
        class: "%kami_api_core.request_body_converter.class%"
        arguments:
            - "@jms_serializer"
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 255 }

    kami_api_core.access_manager:
        class: "%kami_api_core.access_manager.class%"
        arguments:
          - "@security.token_storage"
          - "@annotation_reader"
        public: true

    kami_api_core.form_factory:
        class: "%kami_api_core.form_factory.class%"
        arguments:
          - "@form.factory"
          - "@annotation_reader"
          - "@kami_api_core.access_manager"

    kami_api_core.api_manager:
        class: "%kami_api_core.api_manager.class%"
        arguments:
          - "@doctrine"
          - "@kami_api_core.access_manager"
          - "@kami_api_core.form_factory"
          - "@jms_serializer"
          - "@event_dispatcher"
          - "%kami_api_core.pagination.per_page%"
        public: true


    kami_api_core.step.get_reflection_from_request:
        class:
    kami_api_core.step.validate_resource_access:
        calls:
            - method: setReader
              arguments: ["@annotation_reader"]
            - method: setTokenStorage
              arguments: ["@security.token_storage"]
        tags:
            - { name: 'api_core.request_processor.step' }

    kami_api_core.step.get_doctrine_repository:
        calls:
            - method: setDoctrine
              arguments: [ "@doctrine" ]
        tags:
            - { name: 'api_core.request_processor.step' }

    kami_api_core.step.build_index_query:

    kami_api_core.step.paginate_query:

    kami_api_core.step.send_index_response:

